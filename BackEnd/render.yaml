services:
  # Backend service
  - type: web
    name: blogzy-backend
    env: node
    buildCommand: cd BackEnd && npm install
    startCommand: cd BackEnd && node app.js
    plan: free

  # Frontend service
  - type: web
    name: blogzy-frontend
    env: node
    buildCommand: cd FrontEnd && npm install && npm run build
    startCommand: cd FrontEnd && npm start
    plan: free
